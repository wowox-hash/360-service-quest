  hurt:()=>{ns.triggerAttackRelease('16n');bs.triggerAttackRelease('E2','16n')},
  win:()=>{['C5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>sy.triggerAttackRelease(n,'8n'),i*120))},
  lose:()=>{['C4','B3','A3','G3'].forEach((n,i)=>setTimeout(()=>bs.triggerAttackRelease(n,'4n'),i*200))},
  lvl:()=>{['C5','D5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>sy.triggerAttackRelease(n,'16n'),i*80))},

  pil:()=>{sy.triggerAttackRelease('D5','32n')},

// ── ENCOUNTERS ──
const ENC=[
  {id:1,loc:'Brussels',co:'Belgium',npc:'Marc Peeters',rl:'Purchasing Manager',company:'AutoParts Benelux',v:0,ch:'220 garages + 15 fast-fit centres',seg:'C',mx:42,my:28,
    intro:`Thank you for coming. We have a serious problem with product recommendations. Our 15 counter staff use printed guides last updated six months ago. Hybrids, Euro 7, Chinese imports — our team is guessing. Garages are sending products back. We're losing €8,000/month in reverse logistics. Three garages told us last month they're considering switching. I need a solution that works at the counter, every day.`,
    dia:{q:`Marc is losing €8,000/month to returns. You have one discovery question before the pitch — make it count.`,opts:[
      {t:`When your counter staff get a vehicle they're not sure about, walk me through exactly what happens today.`,buff:'reduceHp',correct:true,fb:`Marc: "They check the printed guide. If it's not listed, they call the hotline or just pick the closest match." — That's the gap. The outdated guide is shipping wrong products.`},
      {t:`Would upselling every garage to a premium synthetic that covers most applications solve it?`,buff:'boostEnemy',correct:false,fb:`Marc: "That might protect quality, but it doesn't solve the identification problem." — You pitched product before discovery. He's now defensive.`},

  {id:2,loc:'Stockholm',co:'Sweden',npc:'Erik Lindqvist',rl:'Commercial Director',company:'Nordic Oil Distribution',v:1,ch:'80 fleet operators + 45 HD workshops',seg:'B',mx:52,my:18,
    intro:`I manage 12 sales reps. Commercially excellent — great relationships, strong negotiators. But we're losing fleet tenders. When a fleet manager asks about drain intervals or TCO for 200 trucks, my reps go quiet. Last quarter, a competitor brought a lubricant engineer to the pitch and walked away with €400K in contracts. My reps had nothing to counter. I can't hire 12 engineers. I need my team to hold their ground.`,
    dia:{q:`Erik just lost €400K to a competitor who brought a lubricant engineer to the pitch. Ask the question that uncovers his real problem.`,opts:[
      {t:`When your reps face a deep technical question in a fleet meeting, what actually happens in the room?`,buff:'reduceHp',correct:true,fb:`Erik: "They say 'I'll get back to you' — but by then the competitor has already answered live." — That confidence gap in the moment IS the problem. Now you can position co-visits.`},
      {t:`Could your reps win more tenders if you sharpened their pricing and negotiation?`,buff:'boostEnemy',correct:false,fb:`Erik: "Pricing? My reps are great negotiators. That's not the gap." — You framed his problem as commercial weakness. He's insulted.`},
      {t:`Have you considered giving your reps more product brochures and TDS documents?`,buff:null,correct:false,fb:`Erik: "We have plenty of docs. They don't replace live technical credibility." — A surface-level probe. Missed the real issue.`},
    ]},
    objs:[
      {t:`"Training takes my people off the road. We did a day last year — nothing changed."`,hp:36,w:['physical_training','academy'],r:['promo_templates','edi'],p:'ENABLE'},
      {t:`"We've been burned before. Two days in a classroom, forgotten in a month."`,hp:40,w:['co_visits'],r:['marketing_portal','custom_label'],p:'ENABLE'},
      {t:`"Fleet managers want lab data — not a sales rep reading from a product sheet."`,hp:36,w:['oil_analysis','co_visits'],r:['promo_calendar','retail_kits'],p:'ENABLE'},
    ],rw:{xp:180,gold:75}},
  {id:3,loc:'Madrid',co:'Spain',npc:'Alejandra Ruiz',rl:'General Manager',company:'Distribución Ibérica',v:2,ch:'300 garages + 40 tyre shops',seg:'C',mx:26,my:40,
    intro:`We're growing 12% yearly, but garages see us as interchangeable. "You all deliver the same thing — whoever's cheapest this month wins." Zero marketing, no POS, no campaigns. I don't have a designer or budget for agencies. But I watch competitors show up with professional displays and we look amateur.`,

function App(){
  const [ph,setPh]=useState('title');
  const [nm,setNm]=useState('');
  const [gold,setGold]=useState(0);
  const [xp,setXp]=useState({CONNECT:0,ENABLE:0,GROW:0,DELIVER:0});
  const [lv,setLv]=useState(1);
  const [done,setDone]=useState([]);
  const [enc,setEnc]=useState(null);
  const [oi,setOi]=useState(0);
  const [oHp,setOHp]=useState(0);
  const [pHp,setPHp]=useState(100);
  const MHP=100;
  const [inv,setInv]=useState(SVC.filter(s=>s.t==='C').map(s=>s.id));
  const [sel,setSel]=useState(null);
  const [selP,setSelP]=useState(null);
  const [log,setLog]=useState([]);
  const [an,setAn]=useState(false);
  const [sE,setSE]=useState(false);
  const [sH,setSH]=useState(false);
  const [fl,setFl]=useState(null);
  const [hf,setHf]=useState(0);
  const [items,setItems]=useState([]);
  const [showW,setShowW]=useState(false);
  const [dmgB,setDmgB]=useState(false);
  const [shld,setShld]=useState(false);
  const [comboB,setComboB]=useState(false);
  const [combo,setCombo]=useState(0);
  const [lastPil,setLastPil]=useState(null);
  const [lvUp,setLvUp]=useState(false);
  const [sndOn,setSndOn]=useState(true);
  const [lb,setLb]=useState([]);
  const [diaBuff,setDiaBuff]=useState(null);
  const [diaAns,setDiaAns]=useState(false);
  const [t0,setT0]=useState(null);
  const [tab,setTab]=useState('map');
  const [flying,setFlying]=useState(null);
  const logRef=useRef(null);

  useEffect(()=>{const iv=setInterval(()=>setHf(f=>(f+1)%4),400);return()=>clearInterval(iv)},[]);
  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight},[log]);
  useEffect(()=>{sbLoad().then(d=>{if(d)setLb(d)})},[]);

  const txp=Object.values(xp).reduce((a,b)=>a+b,0);
  const cLv=Math.floor(txp/200)+1;
  useEffect(()=>{if(cLv>lv){setLv(cLv);let ni=SVC.filter(s=>s.t==='C').map(s=>s.id);if(cLv>=3)ni=[...ni,...SVC.filter(s=>s.t==='B').map(s=>s.id)];if(cLv>=6)ni=[...ni,...SVC.filter(s=>s.t==='A').map(s=>s.id)];setInv(ni);setLvUp(true);snd('lvl');setTimeout(()=>setLvUp(false),2500)}},[cLv]);

  const go=(e)=>{snd('fly');setFlying(e);setTimeout(()=>{setFlying(null);setEnc(e);setOi(0);setOHp(e.objs[0].hp);setPHp(MHP);setLog([]);setSel(null);setSelP(null);setShowW(false);setDmgB(false);setShld(false);setComboB(false);setCombo(0);setLastPil(null);setDiaBuff(null);setDiaAns(false);setPh(e.dia?'dialogue':'intro')},1200)};
  const useI=(id)=>{const i=items.findIndex(x=>x.id===id&&x.u>0);if(i<0)return;const ni=[...items];ni[i]={...ni[i],u:ni[i].u-1};if(ni[i].u<=0)ni.splice(i,1);setItems(ni);snd('buy');
    if(id==='intel'){setShowW(true);setLog(p=>[...p,{y:'i',t:'🔍 Weaknesses revealed!'}])}else if(id==='coffee'){setPHp(p=>Math.min(MHP,p+30));setLog(p=>[...p,{y:'i',t:'☕ +30 HP!'}])}else if(id==='playbook'){setDmgB(true);setLog(p=>[...p,{y:'i',t:'📘 +25% damage!'}])}else if(id==='shield'){setShld(true);setLog(p=>[...p,{y:'i',t:'🛡️ Shield active!'}])}else if(id==='combo_charm'){setComboB(true);setLog(p=>[...p,{y:'i',t:'✨ Combo 2x!'}])}else if(id==='mega_heal'){setPHp(MHP);setLog(p=>[...p,{y:'i',t:'⚡ Full HP!'}])}};

  const atk=useCallback(()=>{
    if(!sel||an||!enc)return;const sv=SVC.find(s=>s.id===sel);const ob=enc.objs[oi];setAn(true);snd('atk');
    const isW=ob.w.includes(sel),isR=ob.r.includes(sel);
    let cm=1,nc=combo;if(sv.p===lastPil){nc=combo+1;cm=1+(nc*.15*(comboB?2:1))}else nc=0;setCombo(nc);setLastPil(sv.p);
    let d=sv.pw;
    if(isW){d=Math.round(sv.pw*1.8*cm*(dmgB?1.25:1)*(diaBuff==='reduceHp'?1.15:1));snd('crit');setSE(true);setFl({y:'c',v:d})}
    else if(isR){d=Math.round(sv.pw*.2);snd('miss');setFl({y:'m',v:d})}
    else{d=Math.round(sv.pw*.7*cm*(dmgB?1.25:1));snd('atk');setSE(true);setFl({y:'n',v:d})}
    setLog(p=>[...p,{y:'p',t:`${isW?'⚔️ SUPER EFFECTIVE! ':''}${sv.n}: ${d} dmg${nc>0?' ('+nc+'x combo)':''}`}]);
    const nH=Math.max(0,oHp-d);setOHp(nH);
    setTimeout(()=>{setSE(false);setFl(null);
      if(nH<=0){setXp(prev=>({...prev,[ob.p]:prev[ob.p]+40}));setLog(p=>[...p,{y:'s',t:'✨ Objection defeated! +40 '+ob.p+' XP'}]);snd('sel');
        setTimeout(()=>{if(oi+1>=enc.objs.length){setGold(g=>g+enc.rw.gold);const sp=Math.floor(enc.rw.xp/4);setXp(p=>{const n={...p};['CONNECT','ENABLE','GROW','DELIVER'].forEach(k=>n[k]+=sp);return n});setDone(p=>[...p,enc.id]);setLog(p=>[...p,{y:'v',t:'🏆 VICTORY! +'+enc.rw.gold+'g +'+enc.rw.xp+'XP'}]);snd('win');setPh('victory');
            if(enc.isBoss){const ft=Math.round((Date.now()-t0)/1000);sbPost({player_name:nm,level:cLv,gold:gold+enc.rw.gold,encounters_cleared:done.length+1,is_champion:true,total_time_seconds:ft,xp_connect:xp.CONNECT,xp_enable:xp.ENABLE,xp_grow:xp.GROW,xp_deliver:xp.DELIVER});sbLoad().then(d=>{if(d)setLb(d)})}
          }else{const nx=enc.objs[oi+1];setOi(oi+1);setOHp(nx.hp+(diaBuff==='boostEnemy'?10:0));setLog(p=>[...p,{y:'s',t:'New objection incoming...'}]);snd('blip');setSelP(null);setSel(null)}setAn(false)},800)}
      else{setTimeout(()=>{const cd=isW?5:isR?(diaBuff==='boostEnemy'?25:20):10;
        if(shld){setShld(false);setLog(p=>[...p,{y:'i',t:'🛡️ Blocked!'}]);snd('sel');setAn(false);return}
        setSH(true);snd('hurt');setPHp(p=>{const nh=Math.max(0,p-cd);if(nh<=0){setLog(p2=>[...p2,{y:'e',t:'💥 -'+cd+'HP! Defeated...'}]);snd('lose');setTimeout(()=>setPh('defeat'),600)}else setLog(p2=>[...p2,{y:'e',t:'💢 Pushback! -'+cd+'HP'}]);return nh});
        setTimeout(()=>{setSH(false);setAn(false)},300)},400)}
    },600);setSel(null);setSelP(null)
  },[sel,an,enc,oi,oHp,combo,lastPil,comboB,dmgB,shld,diaBuff,sndOn,xp]);

  // ═══ TITLE ═══
  if(ph==='title')return h(Pad,null,
    h(LvlUp,{lvUp,lv}),
    h('div',{style:{textAlign:'center',paddingTop:40}},
      h('div',{style:{width:64,height:96,margin:'0 auto',animation:'float 3s ease-in-out infinite'},dangerouslySetInnerHTML:{__html:SP.hero(0)}}),
      h('div',{className:'pf fs-pixel-xl',style:{color:C.gold,marginTop:16,animation:'pulse 2s ease infinite'}},'360°'),
      h('div',{className:'pf fs-pixel-lg',style:{marginTop:4}},'SERVICE QUEST'),
      h('p',{className:'fs-sm',style:{color:C.mu,marginTop:12}},'Battle distributor objections with the right 360° services'),
      h('input',{value:nm,onChange:e=>setNm(e.target.value),placeholder:'Enter your name',maxLength:20,style:{width:'100%',maxWidth:300,margin:'20px auto',display:'block',padding:'12px 16px',background:C.cd,border:'2px solid '+C.bd,borderRadius:10,color:C.tx,fontSize:16,textAlign:'center',outline:'none'}}),
      h('div',{style:{display:'flex',gap:8,justifyContent:'center',marginBottom:20}},
        h('button',{onClick:()=>setSndOn(!sndOn),style:{background:'none',border:'1px solid '+C.bd,color:sndOn?C.gold:C.mu,padding:'10px 16px',fontSize:14,borderRadius:8,cursor:'pointer'}},sndOn?'🔊 Sound ON':'🔇 Sound OFF')),
      h('button',{onClick:async()=>{if(!nm.trim())return alert('Enter your name!');if(!aOn){await Tone.start();aOn=true}setT0(Date.now());setPh('map');snd('sel')},style:{background:'none',border:'2px solid '+C.gold,color:C.gold,padding:'14px 36px',fontSize:16,fontWeight:700,borderRadius:10,cursor:'pointer',animation:'blink 2s ease infinite'}},'▶ START QUEST'),
      // Leaderboard
      lb.length>0&&h('div',{style:{marginTop:28,textAlign:'left'}},
        h('div',{className:'pf fs-pixel-sm',style:{color:C.gold,textAlign:'center',marginBottom:10}},'🏆 GLOBAL LEADERBOARD'),
        lb.slice(0,6).map((e,i)=>h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px',background:'rgba(0,0,0,.3)',borderRadius:8,marginBottom:4,animation:'fadeIn .3s ease '+i*.05+'s both'}},
          h('span',{className:'fs-sm',style:{color:i<3?[C.gold,'#94A3B8','#D97706'][i]:C.tx,fontWeight:600}},(i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':(i+1)+'. ')+e.player_name),
          h('span',{className:'fs-xs',style:{color:C.mu}},'LV'+e.level+' · '+e.encounters_cleared+'⚔️'+(e.is_champion?' 👑':''))))),
      h('p',{className:'fs-xs',style:{color:C.mu,marginTop:28}},'Wolf Oil Corporation · Sales Training')));

  // ═══ DIALOGUE ═══
  if(ph==='dialogue'&&enc)return h(Pad,null,
    h(LvlUp,{lvUp,lv}),
    enc.isBoss&&h('div',{className:'pf fs-pixel-sm',style:{color:C.no,textAlign:'center',marginTop:12,animation:'blink 1s ease infinite'}},'⚠️ FINAL BOSS ⚠️'),
    h('div',{style:{textAlign:'center',marginTop:16}},
      h('div',{style:{width:56,height:84,margin:'0 auto'},dangerouslySetInnerHTML:{__html:enc.isBoss?SP.mon('GROW',true):SP.npc(enc.v)}}),
      h('div',{className:'fs-lg',style:{fontWeight:700,color:enc.isBoss?C.no:C.gold,marginTop:8}},enc.npc),
      h('div',{className:'fs-sm',style:{color:C.mu}},enc.rl+' — '+enc.company),
      h('div',{className:'fs-xs',style:{color:C.mu,marginTop:2}},'📍 '+enc.loc+', '+enc.co+' · '+enc.ch)),
    // NPC speech
    h('div',{style:{background:C.cd,border:'2px solid '+C.bd,borderRadius:12,padding:16,marginTop:16,animation:'fadeIn .5s ease'}},
      h('div',{className:'fs-sm',style:{color:'#c0bfe0',lineHeight:1.7}},enc.intro)),
    // Discovery question
    h('div',{style:{background:C.cd,border:'2px solid '+C.gold,borderRadius:12,padding:16,marginTop:12,animation:'fadeIn .5s ease .2s both'}},
      h('div',{className:'fs-xs',style:{color:C.gold,fontWeight:700,marginBottom:8}},diaAns?'💡 DISCOVERY INSIGHT':'💬 CHOOSE YOUR DISCOVERY QUESTION'),
      h('div',{className:'fs-sm',style:{marginBottom:12,lineHeight:1.6,color:C.mu,fontStyle:'italic'}},enc.dia.q),
      !diaAns?enc.dia.opts.map((o,i)=>h('button',{key:i,onClick:()=>{setDiaBuff(o.buff);setDiaAns(true);snd(o.correct?'good':'bad')},style:{display:'block',width:'100%',textAlign:'left',background:'rgba(255,255,255,.03)',border:'1px solid '+C.bd,borderRadius:8,padding:'12px 14px',marginBottom:8,fontSize:14,lineHeight:1.6,color:C.tx,cursor:'pointer'}},String.fromCharCode(65+i)+'. '+o.t)):
      h('div',null,
        enc.dia.opts.map((o,i)=>h('div',{key:i,style:{padding:'10px 12px',marginBottom:6,borderRadius:8,fontSize:13,lineHeight:1.6,background:o.correct?'rgba(16,185,129,.12)':diaBuff===o.buff&&!o.correct?'rgba(239,68,68,.12)':'rgba(255,255,255,.02)',border:'1px solid '+(o.correct?C.ok:diaBuff===o.buff&&!o.correct?C.no:C.bd),color:o.correct?C.ok:diaBuff===o.buff&&!o.correct?C.no:C.mu}},
          String.fromCharCode(65+i)+'. '+o.t,
          (o.correct||diaBuff===o.buff)&&h('div',{className:'fs-xs',style:{marginTop:6,color:o.correct?C.ok:C.no}},o.fb))),
        h('div',{style:{marginTop:10,padding:'10px 12px',borderRadius:8,fontSize:13,background:diaBuff==='reduceHp'?'rgba(16,185,129,.08)':diaBuff==='boostEnemy'?'rgba(239,68,68,.08)':'rgba(255,255,255,.03)',color:diaBuff==='reduceHp'?C.ok:diaBuff==='boostEnemy'?C.no:C.mu}},
          diaBuff==='reduceHp'?'✅ Battle buff: +15% damage!':diaBuff==='boostEnemy'?'⚠️ Enemy buff: stronger counters!':'➡️ Neutral start.'),
        h('button',{onClick:()=>{setPh('battle');if(diaBuff==='boostEnemy')setOHp(hp=>hp+10);setLog([{y:'s',t:'⚔️ Battle start! '+enc.objs.length+' objections.'}]);enc.isBoss?snd('boss'):snd('blip')},style:{marginTop:12,width:'100%',background:'none',border:'2px solid '+C.gold,color:C.gold,padding:'14px',fontSize:16,fontWeight:700,borderRadius:10,cursor:'pointer'}},'⚔️ ENTER BATTLE'))));

  // ═══ BATTLE ═══
  if((ph==='battle'||ph==='victory'||ph==='defeat')&&enc){
    const ob=enc.objs[oi];
    const av=inv.map(id=>SVC.find(s=>s.id===id)).filter(Boolean);
    const ui=items.filter(x=>x.u>0);
    const pSvcs=selP?av.filter(s=>s.p===selP):[];

    return h(Pad,null,
      h(LvlUp,{lvUp,lv}),
      // Arena
      h('div',{style:{background:'rgba(0,0,0,.4)',borderRadius:12,border:'2px solid '+(enc.isBoss?C.no:C.bd),padding:16,position:'relative',minHeight:160,marginTop:8}},
        // Enemy (top right)
        h('div',{style:{position:'absolute',right:16,top:12,textAlign:'center',animation:sE?'shake .3s ease':'none'}},
          ob&&h(React.Fragment,null,
            h('div',{style:{width:enc.isBoss?56:44,height:enc.isBoss?56:44,margin:'0 auto'},dangerouslySetInnerHTML:{__html:SP.mon(ob.p,enc.isBoss)}}),
            h('div',{className:'fs-xs',style:{color:PC[ob.p],fontWeight:700,marginTop:4}},ob.p),
            h(HpBar,{v:oHp,m:ob.hp,w:90}),
            h('div',{className:'fs-xs',style:{color:C.mu,marginTop:2}},oHp+'/'+ob.hp),
            showW&&h('div',{className:'fs-xs',style:{color:C.ok,marginTop:2}},'⚡ '+ob.w.map(id=>SVC.find(s=>s.id===id)?.n).join(', '))),
          fl&&h('div',{className:'pf',style:{position:'absolute',top:-10,right:8,fontSize:fl.y==='c'?18:14,fontWeight:'bold',color:fl.y==='c'?C.gold:fl.y==='m'?C.no:'#fff',animation:'cpop .7s ease forwards'}},(fl.y==='c'?'💥':'')+fl.v)),
        // Hero (bottom left)
        h('div',{style:{position:'absolute',left:16,bottom:12,textAlign:'center',animation:sH?'shake .3s ease':'none'}},
          h('div',{style:{width:32,height:48},dangerouslySetInnerHTML:{__html:SP.hero(hf)}}),
          h('div',{className:'fs-xs',style:{color:C.gold,fontWeight:600,marginTop:2}},nm),
          h(HpBar,{v:pHp,m:MHP,w:70}),
          combo>0&&h('div',{className:'fs-xs',style:{color:C.ok}},'🔥 '+combo+'x combo')),
        // Overlays
        ph==='victory'&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.65)',borderRadius:12}},
          h('div',{style:{textAlign:'center',animation:'vb 1s ease infinite'}},
            h('div',{className:'pf fs-pixel-lg',style:{color:C.gold}},'🏆 VICTORY!'),
            h('div',{className:'fs-md',style:{marginTop:8}},'+'+enc.rw.gold+'g · +'+enc.rw.xp+'XP'),
            enc.isBoss&&h('div',{className:'pf fs-pixel-sm',style:{color:C.ok,marginTop:10}},'👑 360° SALES CHAMPION'))),
        ph==='defeat'&&h('div',{style:{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(0,0,0,.7)',borderRadius:12}},
          h('div',{style:{textAlign:'center'}},
            h('div',{className:'pf fs-pixel-md',style:{color:C.no}},'DEFEATED'),
            h('div',{className:'fs-sm',style:{color:C.mu,marginTop:6}},'Buy items and try again!')))),

      // Objection
      ob&&ph==='battle'&&h('div',{style:{background:C.cd,border:'1px solid '+PC[ob.p]+'44',borderRadius:10,padding:12,marginTop:10}},
        h('div',{className:'fs-xs',style:{color:PC[ob.p],fontWeight:700}},'OBJECTION '+String(oi+1)+'/'+enc.objs.length),
        h('div',{className:'fs-sm',style:{marginTop:4,lineHeight:1.6}},ob.t)),

      // Battle log
      h('div',{ref:logRef,style:{background:'rgba(0,0,0,.4)',borderRadius:8,border:'1px solid '+C.bd,padding:8,height:60,overflowY:'auto',marginTop:8}},
        log.map((l,i)=>h('div',{key:i,className:'fs-xs',style:{color:l.y==='p'?C.ok:l.y==='e'?C.no:l.y==='v'?C.gold:l.y==='i'?'#A78BFA':C.mu}},l.t))),

      // Items
      ph==='battle'&&ui.length>0&&h('div',{style:{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}},
        ui.map((it,i)=>{const si=SHOP.find(x=>x.id===it.id);return h('button',{key:i,disabled:an,onClick:()=>useI(it.id),style:{background:C.cd,border:'1px solid '+C.bd,borderRadius:8,padding:'8px 12px',fontSize:13,color:C.tx,cursor:an?'default':'pointer'}},si?.ic+' '+si?.nm)})),

      // ═══ PILLAR-FIRST MENU ═══
      ph==='battle'&&!selP&&h('div',{style:{marginTop:12,animation:'fadeIn .3s ease'}},
        h('div',{className:'fs-sm',style:{color:C.mu,fontWeight:600,marginBottom:8}},'⚔️ Choose your pillar:'),
        h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
          ['CONNECT','ENABLE','GROW','DELIVER'].map(p=>{
            const cnt=av.filter(s=>s.p===p).length;
            return h('button',{key:p,disabled:an||cnt===0,onClick:()=>{setSelP(p);snd('pil')},style:{background:PCB[p],border:'2px solid '+PC[p],borderRadius:12,padding:'16px 12px',textAlign:'center',cursor:an||cnt===0?'default':'pointer',opacity:cnt===0?.3:1}},
              h('div',{style:{fontSize:28}},PI[p]),
              h('div',{className:'fs-md',style:{fontWeight:700,color:PC[p],marginTop:4}},PN[p]),
              h('div',{className:'fs-xs',style:{color:C.mu,marginTop:2}},PS[p]),
              h('div',{className:'fs-xs',style:{color:PC[p],marginTop:6,fontWeight:600}},cnt+' service'+(cnt>1?'s':'')))}))),

      // ═══ SERVICE LIST (after pillar selected) ═══
      ph==='battle'&&selP&&h('div',{style:{marginTop:12,animation:'fadeIn .2s ease'}},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
          h('button',{onClick:()=>{setSelP(null);setSel(null);snd('blip')},style:{background:'none',border:'1px solid '+C.bd,borderRadius:8,padding:'8px 14px',fontSize:13,color:C.mu,cursor:'pointer'}},'← Back'),
          h('div',{className:'fs-md',style:{fontWeight:700,color:PC[selP]}},PI[selP]+' '+PN[selP])),
        h('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          pSvcs.map(s=>h('button',{key:s.id,disabled:an,onClick:()=>{setSel(s.id);snd('sel')},style:{display:'flex',alignItems:'center',gap:12,background:sel===s.id?PC[s.p]+'22':C.cd,border:'1px solid '+(sel===s.id?PC[s.p]:C.bd),borderRadius:10,padding:'14px 14px',textAlign:'left',cursor:an?'default':'pointer',opacity:an?.5:1}},
            h('div',{style:{minWidth:36,textAlign:'center'}},
              h('div',{className:'pf',style:{fontSize:14,fontWeight:'bold',color:PC[s.p]}},s.pw),
              h('div',{className:'fs-xs',style:{color:C.mu}},'ATK')),
            h('div',{style:{flex:1}},
              h('div',{className:'fs-sm',style:{fontWeight:700,color:sel===s.id?PC[s.p]:C.tx}},s.n),
              h('div',{className:'fs-xs',style:{color:C.mu}},s.d)),
            h(Tier,{t:s.t})))),
        sel&&h('button',{onClick:atk,disabled:an,style:{width:'100%',marginTop:12,background:PC[selP],border:0,borderRadius:10,padding:'14px',fontSize:16,fontWeight:700,color:'#fff',cursor:an?'default':'pointer',opacity:an?.5:1}},'⚔️ Deploy '+SVC.find(s=>s.id===sel)?.n)),

      // Return
      (ph==='victory'||ph==='defeat')&&h('div',{style:{textAlign:'center',marginTop:16}},
        h('button',{onClick:()=>{setPh('map');setTab('map');snd('sel');sbLoad().then(d=>{if(d)setLb(d)})},style:{background:'none',border:'2px solid '+C.gold,color:C.gold,padding:'14px 28px',fontSize:16,fontWeight:700,borderRadius:10,cursor:'pointer'}},'← World Map')));
  }

  // ═══ MAP / SHOP / INVENTORY ═══
  const bossReady=done.length>=6;
  return h(Pad,null,
    h(LvlUp,{lvUp,lv}),
    // HUD
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',background:'rgba(0,0,0,.4)',borderRadius:10,padding:'10px 14px',marginTop:8,border:'1px solid '+C.bd}},
      h('div',null,h('span',{className:'fs-xs',style:{color:C.mu}},'LV'),h('span',{className:'pf',style:{fontSize:16,color:C.gold,marginLeft:4}},lv)),
      h('div',{className:'fs-sm',style:{fontWeight:600}},nm),
      h('div',{className:'fs-sm',style:{color:C.gold,fontWeight:600}},'💰 '+gold),
      h('button',{onClick:()=>setSndOn(!sndOn),style:{background:'none',border:'none',fontSize:18,cursor:'pointer',padding:4}},sndOn?'🔊':'🔇')),
    // XP bars
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:4,marginTop:8}},
      ['CONNECT','ENABLE','GROW','DELIVER'].map(p=>h('div',{key:p,style:{background:'rgba(0,0,0,.3)',borderRadius:6,padding:'6px 8px',border:'1px solid '+C.bd}},
        h('div',{className:'fs-xs',style:{color:PC[p],fontWeight:600}},PI[p]+' '+p.slice(0,3)),
        h('div',{style:{height:5,background:'rgba(0,0,0,.5)',borderRadius:3,marginTop:3,overflow:'hidden'}},h('div',{style:{height:'100%',background:PC[p],width:Math.min(100,(xp[p]%200)/2)+'%',transition:'width .3s'}})),
        h('div',{className:'fs-xs',style:{color:C.mu,marginTop:2}},xp[p])))),
    // Tabs
    h('div',{style:{display:'flex',gap:4,marginTop:8}},
      ['map','shop','bag'].map(t=>h('button',{key:t,onClick:()=>{setTab(t);snd('blip')},style:{flex:1,background:tab===t?'rgba(59,130,246,.12)':'rgba(0,0,0,.3)',border:'1px solid '+(tab===t?C.con:C.bd),borderRadius:8,padding:'10px 8px',fontSize:14,fontWeight:tab===t?700:500,color:tab===t?C.con:C.mu,cursor:'pointer'}},t==='map'?'🗺️ Map':t==='shop'?'🛒 Shop':'🎒 '+inv.length+'/33'))),

    // SHOP
    tab==='shop'&&h('div',{style:{marginTop:12}},
      h('div',{className:'pf fs-pixel-sm',style:{color:C.gold,textAlign:'center',marginBottom:10}},'⭐ ITEM SHOP'),
      h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}},
        SHOP.map(it=>{const ow=items.filter(x=>x.id===it.id).reduce((a,x)=>a+x.u,0);
          return h('button',{key:it.id,onClick:()=>{if(gold>=it.cost){setGold(g=>g-it.cost);setItems(p=>[...p,{id:it.id,u:1}]);snd('buy')}},disabled:gold<it.cost,style:{background:C.cd,border:'1px solid '+(gold>=it.cost?C.gold:C.bd),borderRadius:10,padding:12,textAlign:'center',cursor:gold>=it.cost?'pointer':'default',opacity:gold>=it.cost?1:.5}},
            h('div',{style:{fontSize:28}},it.ic),
            h('div',{className:'fs-sm',style:{fontWeight:600,marginTop:4}},it.nm),
            h('div',{className:'fs-xs',style:{color:C.mu,marginTop:2}},it.ds),
            h('div',{className:'fs-md',style:{color:C.gold,fontWeight:700,marginTop:4}},it.cost+'g'),
            ow>0&&h('div',{className:'fs-xs',style:{color:C.ok,marginTop:2}},'Owned: ×'+ow))}))),

    // INVENTORY
    tab==='bag'&&h('div',{style:{marginTop:12}},
      h('div',{className:'fs-lg',style:{fontWeight:700,marginBottom:10}},'🎒 Service Inventory'),
      ['CONNECT','ENABLE','GROW','DELIVER'].map(p=>h('div',{key:p,style:{marginBottom:14}},
        h('div',{className:'fs-md',style:{color:PC[p],fontWeight:700,marginBottom:6}},PI[p]+' '+p),
        h('div',{style:{display:'flex',flexDirection:'column',gap:4}},
          SVC.filter(s=>s.p===p).map(s=>{const has=inv.includes(s.id);return h('div',{key:s.id,style:{display:'flex',alignItems:'center',gap:10,background:has?PCB[p]:'rgba(0,0,0,.2)',border:'1px solid '+(has?PC[p]+'55':C.bd),borderRadius:8,padding:'10px 12px',opacity:has?1:.35}},
            h('span',{className:'pf',style:{fontSize:12,color:PC[p],fontWeight:'bold',minWidth:30}},has?'⚔️'+s.pw:'🔒'),
            h('span',{className:'fs-sm',style:{flex:1,color:has?C.tx:C.mu}},s.n),
            h(Tier,{t:s.t}))}))))),

    // WORLD MAP
    tab==='map'&&h(React.Fragment,null,
      h(WorldMap,{style:{height:280,marginTop:12}},
        ENC.map((l,i)=>{const lk=l.seg==='B'&&lv<3||l.seg==='A'&&lv<6;const d=done.includes(l.id);
          return h('div',{key:l.id,onClick:()=>{if(!lk&&!d)go(l)},style:{position:'absolute',left:l.mx+'%',top:l.my+'%',transform:'translate(-50%,-100%)',cursor:lk||d?'default':'pointer',opacity:lk?.2:d?.5:1,animation:!lk&&!d?'bob 2s ease infinite':'none',zIndex:2}},
            h('div',{style:{width:16,height:16,borderRadius:'50%',background:d?'#92400E':lk?C.mu:PC[l.objs[0]?.p],border:'2px solid '+(d?C.gold:'#fff'),margin:'0 auto',boxShadow:!d&&!lk?'0 0 8px '+PC[l.objs[0]?.p]:''}}),
            h('div',{className:'fs-xs',style:{textAlign:'center',marginTop:3,color:d?C.mu:C.tx,fontWeight:600,whiteSpace:'nowrap'}},l.loc),
            h('div',{className:'fs-xs',style:{textAlign:'center',color:lk?C.no:d?C.gold:PC[l.objs[0]?.p]}},lk?'🔒':d?'✓':l.seg))}),
        // Boss
        h('div',{onClick:()=>{if(bossReady&&!done.includes(99))go(BOSS)},style:{position:'absolute',left:BOSS.mx+'%',top:BOSS.my+'%',transform:'translate(-50%,-100%)',cursor:bossReady&&!done.includes(99)?'pointer':'default',opacity:bossReady?done.includes(99)?.4:1:.15,animation:bossReady&&!done.includes(99)?'float 2s ease infinite':'none',zIndex:3}},
          h('div',{style:{width:24,height:24,borderRadius:'50%',background:done.includes(99)?'#92400E':C.no,border:'2px solid '+C.gold,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'center',fontSize:14,boxShadow:bossReady?'0 0 12px '+C.no:''}},'👑'),
          h('div',{className:'fs-xs',style:{textAlign:'center',marginTop:3,fontWeight:700,color:done.includes(99)?C.gold:bossReady?C.no:C.mu}},done.includes(99)?'CHAMPION':bossReady?'BOSS':'🔒 Clear 6')),
        // Plane
        flying&&h('div',{style:{position:'absolute',left:flying.mx+'%',top:(flying.my-5)+'%',transform:'translate(-50%,-50%)',width:32,height:20,animation:'float .4s ease infinite',zIndex:10},dangerouslySetInnerHTML:{__html:SP.plane}}),
        // Hero
        h('div',{style:{position:'absolute',left:'50%',bottom:8,transform:'translateX(-50%)',width:20,height:30,animation:'bob 1.5s ease infinite'},dangerouslySetInnerHTML:{__html:SP.hero(hf)}})),
      // Stats
      h('div',{className:'fs-xs',style:{display:'flex',justifyContent:'space-between',marginTop:8,padding:'8px 12px',background:'rgba(0,0,0,.3)',borderRadius:8,color:C.mu}},
        h('span',null,'🏢 '+done.length+'/'+(ENC.length+1)),
        h('span',null,'🎒 '+inv.length+'/33'),
        h('span',null,'🛒 '+items.length+' items'))));
}

ReactDOM.createRoot(document.getElementById('R')).render(h(App));
</script>
</body>
</html>
