<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const h=React.createElement;

// ── BRIDGE: Phaser ↔ React event emitter (+ shared spawn position) ──
const Bridge={_l:{},_lastPos:null,on(e,f){(this._l[e]||=[]).push(f)},off(e,f){this._l[e]=(this._l[e]||[]).filter(x=>x!==f)},emit(e,d){(this._l[e]||[]).forEach(f=>f(d))}};

// ── CHARACTER BUILDER: palettes + currently-selected indices (mutable, read by both SP.hero and genHeroTex) ──
const HAIR_OPTS=[
 {nm:'Brown',hi:'#8a4a20',mid:'#6a3a10',lo:'#3a1a00'},
 {nm:'Blonde',hi:'#ffe066',mid:'#c89000',lo:'#704400'},
 {nm:'Black',hi:'#3a3a3a',mid:'#1a1a1a',lo:'#000000'},
 {nm:'Red',hi:'#e8662a',mid:'#a83a10',lo:'#5a1a00'},
];
const SKIN_OPTS=[
 {nm:'Light',hi:'#ffe0c0',mid:'#F5C99A',lo:'#D4956A'},
 {nm:'Tan',hi:'#e8b888',mid:'#c8956a',lo:'#9a6a3a'},
 {nm:'Dark',hi:'#a87a52',mid:'#8b5e3c',lo:'#5a3a20'},
];
const TUNIC_OPTS=[
 {nm:'Blue',hi:'#4060a0',mid:'#1a1a5c',lo:'#0a0a3c',acc:'#5070b0'},
 {nm:'Red',hi:'#c83a3a',mid:'#8a1a1a',lo:'#5a0a0a',acc:'#d85a5a'},
 {nm:'Green',hi:'#3a8a3a',mid:'#1a5a1a',lo:'#0a3a0a',acc:'#5aaa5a'},
 {nm:'Purple',hi:'#8a3aca',mid:'#5a1a8a',lo:'#3a0a5a',acc:'#aa5ada'},
];
const CHAR={hair:1,skin:0,tunic:0};
// ── MINIMAP: path connections between buildings (matches carveLine calls in genMapData) ──
const PATH_LINKS=[[22,22,22,42],[22,42,22,68],[50,14,40,42],[78,22,60,42],[22,42,40,42],[40,42,60,42],[60,42,78,58],[22,68,50,84],[78,58,50,84],[50,84,50,92]];

// ── ACHIEVEMENTS: unlocked once and remembered for the session ──
const ACHIEVEMENTS=[
 {id:'first_blood',ic:'⚔️',nm:'First Blood',desc:'Win your first encounter'},
 {id:'flawless',ic:'🛡️',nm:'Flawless',desc:'Win an encounter without taking damage'},
 {id:'perfect_dia',ic:'💡',nm:'Master of Discovery',desc:'5 perfect discovery questions'},
 {id:'limit',ic:'⚡',nm:'Limit Breaker',desc:'Use a Limit Break in combat'},
 {id:'combo5',ic:'🔥',nm:'Combo King',desc:'Hit a 5-chain combo'},
 {id:'rich',ic:'💰',nm:'Big Earner',desc:'Hit 200 gold'},
 {id:'half',ic:'📈',nm:'Halfway There',desc:'Clear half the encounters'},
 {id:'champ',ic:'👑',nm:'Sales Champion',desc:'Defeat the Automechanika boss'},
];
// ── MENTORS: passive class-like bonuses chosen at character creation ──
const MENTORS=[
 {nm:'The Veteran',ic:'🛡️',desc:'+20 max HP · resilient',hpBonus:20,wDmgMult:1,goldMult:1},
 {nm:'The Specialist',ic:'⚔️',desc:'+25% weakness damage',hpBonus:0,wDmgMult:1.25,goldMult:1},
 {nm:'The Closer',ic:'💰',desc:'+50% gold from victories',hpBonus:0,wDmgMult:1,goldMult:1.5},
];

/* ══════════════════════════════════════════════
   360° SERVICE QUEST v5 — MOBILE OPTIMIZED
   Readable fonts · Touch targets · Responsive
   ══════════════════════════════════════════════ */

// ── SUPABASE ──
const SB='https://uacgjerqeglsstvqjtoh.supabase.co';
const SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhY2dqZXJxZWdsc3N0dnFqdG9oIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDc1MjksImV4cCI6MjA4OTU4MzUyOX0.jMo9JG4dtzRH-_-UKZRGViRtGOmCm3mW8IVjNl4H49I';
const sbF=async(p,o={})=>{try{const r=await fetch(`${SB}/rest/v1/${p}`,{headers:{'apikey':SK,'Content-Type':'application/json','Prefer':o.prefer||'return=representation',...(o.headers||{})},...o});return r.ok?await r.json():null}catch{return null}};
const sbLoad=async()=>await sbF('quest_leaderboard?order=is_champion.desc,encounters_cleared.desc,total_time_seconds.asc&limit=20')||[];
const sbPost=async(d)=>await sbF('quest_leaderboard',{method:'POST',body:JSON.stringify(d)});

// ── AUDIO ──
let aOn=false;
const sy=new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.01,decay:.1,sustain:.1,release:.1},volume:-14}).toDestination();
const ns=new Tone.NoiseSynth({noise:{type:'white'},envelope:{attack:.01,decay:.08,sustain:0,release:.05},volume:-22}).toDestination();
const bs=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.01,decay:.2,sustain:.05,release:.15},volume:-12}).toDestination();
const sfx={
  atk:()=>{sy.triggerAttackRelease('C5','16n');setTimeout(()=>sy.triggerAttackRelease('E5','16n'),60)},
  crit:()=>{sy.triggerAttackRelease('E5','16n');setTimeout(()=>sy.triggerAttackRelease('G5','16n'),80);setTimeout(()=>sy.triggerAttackRelease('C6','8n'),160)},
  miss:()=>{bs.triggerAttackRelease('C3','8n')},
  hurt:()=>{ns.triggerAttackRelease('16n');bs.triggerAttackRelease('E2','16n')},
  win:()=>{['C5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>sy.triggerAttackRelease(n,'8n'),i*120))},
  lose:()=>{['C4','B3','A3','G3'].forEach((n,i)=>setTimeout(()=>bs.triggerAttackRelease(n,'4n'),i*200))},
  lvl:()=>{['C5','D5','E5','G5','C6'].forEach((n,i)=>setTimeout(()=>sy.triggerAttackRelease(n,'16n'),i*80))},
  sel:()=>{sy.triggerAttackRelease('A4','32n')},
  buy:()=>{sy.triggerAttackRelease('E5','16n');setTimeout(()=>sy.triggerAttackRelease('G5','16n'),80)},
  blip:()=>{sy.triggerAttackRelease('C4','32n')},
  boss:()=>{['C3','C3','G3','C3'].forEach((n,i)=>setTimeout(()=>bs.triggerAttackRelease(n,'8n'),i*200))},
  good:()=>{sy.triggerAttackRelease('G5','16n');setTimeout(()=>sy.triggerAttackRelease('C6','16n'),100)},
  bad:()=>{bs.triggerAttackRelease('D3','8n')},
  fly:()=>{['E4','G4','A4','B4','D5'].forEach((n,i)=>setTimeout(()=>sy.triggerAttackRelease(n,'32n'),i*60))},
  pil:()=>{sy.triggerAttackRelease('D5','32n')},
};
const snd=(k)=>{if(aOn&&sfx[k])try{sfx[k]()}catch{}};

// ── BGM (background music via Tone.Loop) ──
const bgmLead=new Tone.Synth({oscillator:{type:'triangle'},envelope:{attack:.02,decay:.3,sustain:.15,release:.4},volume:-16}).toDestination();
const bgmBass=new Tone.Synth({oscillator:{type:'sine'},envelope:{attack:.02,decay:.4,sustain:.2,release:.4},volume:-18}).toDestination();
const bgmHarm=new Tone.Synth({oscillator:{type:'square'},envelope:{attack:.02,decay:.3,sustain:.1,release:.3},volume:-22}).toDestination();
let bgmActive=null;const bgmLoops=[];
const BGM_TRACKS={
 title:{bpm:90,
  melody:['C5','E5','G5','C6','B5','G5','E5','G5','A5','C6','E6','G6','F6','D6','C6','G5'],melodyDur:'4n',
  harm:['E4','G4','C5','E5','D5','B4','G4','B4','F4','A4','C5','F5','E5','C5','A4','E5'],harmDur:'4n',
  bass:['C3','C3','A2','A2','F2','F2','G2','G2'],bassDur:'2n'},
 overworld:{bpm:118,
  melody:['G4','B4','D5','G5','D5','B4','G4','B4','A4','C5','E5','A5','E5','C5','A4','C5','D5','F5','A5','D6','A5','F5','D5','F5','C5','E5','G5','C6','G5','E5','C5','E5'],melodyDur:'8n',
  harm:['G3','D4','G3','B3','A3','E4','A3','C4','D4','F4','D4','A3','C4','G4','C4','E4'],harmDur:'4n',
  bass:['G2','G2','A2','A2','D2','D2','C2','C2'],bassDur:'2n'},
 battle:{bpm:155,
  melody:['A4','E5','A5','C6','A5','E5','A4','E5','G4','D5','G5','B5','G5','D5','G4','D5','F4','C5','F5','A5','F5','C5','F4','C5','E4','B4','E5','G5','E5','B4','E4','B4'],melodyDur:'8n',
  harm:['A3','C4','A3','E4','G3','B3','G3','D4','F3','A3','F3','C4','E3','G3','E3','B3'],harmDur:'4n',
  bass:['A2','A2','A2','E2','G2','G2','G2','D2','F2','F2','F2','C2','E2','E2','E2','B1'],bassDur:'4n'},
 boss:{bpm:108,
  melody:['E4','G4','B4','E5','D5','C5','B4','G4','A4','C5','E5','A5','G5','F5','E5','C5','D5','F5','A5','D6','C6','A5','G5','F5','E5','G5','B5','E6','D6','B5','A5','E5'],melodyDur:'4n',
  harm:['E3','G3','B3','E4','D4','C4','B3','E4','A3','C4','E4','A4','G4','F4','E4','C4'],harmDur:'4n',
  bass:['E2','E2','D2','D2','C2','C2','B2','B2'],bassDur:'2n'},
};
function playBGM(name){
 if(bgmActive===name)return;
 stopBGM();
 if(!aOn||!sndOn||!BGM_TRACKS[name])return;
 bgmActive=name;
 const t=BGM_TRACKS[name];
 try{Tone.Transport.bpm.value=t.bpm}catch(e){return}
 let mi=0,hi=0,bi=0;
 const lL=new Tone.Loop(time=>{try{bgmLead.triggerAttackRelease(t.melody[mi%t.melody.length],t.melodyDur,time)}catch(e){}mi++},t.melodyDur).start(0);
 const hL=new Tone.Loop(time=>{try{bgmHarm.triggerAttackRelease(t.harm[hi%t.harm.length],t.harmDur,time)}catch(e){}hi++},t.harmDur).start(0);
 const bL=new Tone.Loop(time=>{try{bgmBass.triggerAttackRelease(t.bass[bi%t.bass.length],t.bassDur,time)}catch(e){}bi++},t.bassDur).start(0);
 bgmLoops.push(lL,hL,bL);
 if(Tone.Transport.state!=='started')Tone.Transport.start();
}
function stopBGM(){bgmLoops.forEach(l=>{try{l.dispose()}catch(e){}});bgmLoops.length=0;bgmActive=null}

// ── SPRITES (pixel art SVGs) ──

let MAP_DATA=null;
function genMapData(){
 const m=Array.from({length:MH},()=>Array(MW).fill(0));
 // Base grass (tile 0)
 for(let y=0;y<MH;y++)for(let x=0;x<MW;x++)m[y][x]=0;
 function carveLine(x0,y0,x1,y1){
  const steps=Math.max(Math.abs(x1-x0),Math.abs(y1-y0))*3;
  for(let i=0;i<=steps;i++){
   const t=i/steps,tx=Math.round(x0+(x1-x0)*t),ty=Math.round(y0+(y1-y0)*t);
   for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){
    const nx=tx+dx,ny=ty+dy;
    if(nx>=2&&nx<MW-2&&ny>=2&&ny<MH-2)m[ny][nx]=3;
   }
  }
 }
 const bt=e=>[Math.round(e.mx*MW/100),Math.round(e.my*MH/100)];
 const b=ALL.map(bt);
 carveLine(b[6][0],b[6][1],b[0][0],b[0][1]);
 carveLine(b[0][0],b[0][1],b[2][0],b[2][1]);
 carveLine(b[1][0],b[1][1],b[5][0],b[5][1]);
 carveLine(b[3][0],b[3][1],b[7][0],b[7][1]);
 carveLine(b[0][0],b[0][1],b[5][0],b[5][1]);
 carveLine(b[5][0],b[5][1],b[7][0],b[7][1]);
 carveLine(b[7][0],b[7][1],b[4][0],b[4][1]);
 carveLine(b[2][0],b[2][1],b[8][0],b[8][1]);
 carveLine(b[4][0],b[4][1],b[8][0],b[8][1]);
 carveLine(b[8][0],b[8][1],Math.round(50*MW/100),MH-3);
 // Hedge ring removed: it was creating maze-like corridors and dead ends
 // around buildings. The carved stone paths are enough structure on their own.
 // Water pond top-left quadrant (decorative, player routes around it)
 const pondX=10,pondY=55;
 for(let dy=0;dy<5;dy++)for(let dx=0;dx<6;dx++){
  const nx=pondX+dx,ny=pondY+dy;
  if(m[ny]&&m[ny][nx]===0)m[ny][nx]=4;
 }
 // Second pond top-right
 const pond2X=48,pond2Y=6;
 for(let dy=0;dy<4;dy++)for(let dx=0;dx<5;dx++){
  const nx=pond2X+dx,ny=pond2Y+dy;
  if(m[ny]&&m[ny][nx]===0)m[ny][nx]=4;
 }
 return m;
}

function drawGrass(x,ox,oy){
 x.fillStyle='#4a8a3d';x.fillRect(ox,oy,16,16);
 // Blade-tuft pattern at fixed positions for seamless tiling
 x.fillStyle='#6aaa4d';

 tufts.forEach(([tx,ty])=>{
  x.fillRect(ox+tx,oy+ty-1,1,1);

 // Bright highlight dots
 x.fillStyle='#8aca6d';
 x.fillRect(ox+3,oy+3,1,1);x.fillRect(ox+11,oy+2,1,1);x.fillRect(ox+8,oy+8,1,1);x.fillRect(ox+13,oy+12,1,1);
}

function drawHedge(x,ox,oy){

 x.fillStyle='#e0e8ff';
 x.fillRect(ox+2,oy+3,1,1);x.fillRect(ox+9,oy+6,1,1);x.fillRect(ox+4,oy+10,1,1);

function genGround(scene){
 const m=genMapData();MAP_DATA=m;
 const c=document.createElement('canvas');c.width=MPX;c.height=MPY;
 const x=c.getContext('2d');
 for(let iy=0;iy<MH;iy++)for(let ix=0;ix<MW;ix++){
  const t=m[iy][ix],ox=ix*TS,oy=iy*TS;
  if(t===3)drawPath(x,ox,oy);
  else if(t===4)drawWater(x,ox,oy);

 }
 scene.textures.addCanvas('ground',c);
}

 });

   if(this.doneIds.includes(enc.id))continue;
   if(enc.id===99&&!this.bossReady)continue;
   if((enc.seg==='B'&&this.playerLv<3)||(enc.seg==='A'&&this.playerLv<6))continue;
   const d=Phaser.Math.Distance.Between(this.hero.x,this.hero.y,npc.x,npc.y);
   if(d<70){
    this.exclSprite.setPosition(npc.x,npc.y-24);
    this.exclSprite.setVisible(true);
    this.exclSprite.setAlpha(0.55+0.45*Math.sin(time/180));
    showed=true;break;
   }
  }
  if(!showed)this.exclSprite.setVisible(false);
 }
}
