<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:'DM Sans',sans-serif;background:#0f0e17;color:#e0dff0;min-height:100dvh;overflow-x:hidden}
#R{min-height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.pf{font-family:'Press Start 2P','Courier New',monospace}
/* Animations */
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse{0%,100%{text-shadow:0 0 8px #F59E0B}50%{text-shadow:0 0 20px #F59E0B}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}60%{transform:translateX(4px)}}
@keyframes cpop{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-30px) scale(1.5);opacity:0}}
@keyframes vb{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes lu{0%{transform:scale(.6);opacity:0}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes starFly{0%{transform:translate(0,0) rotate(0deg) scale(.2);opacity:0}25%{opacity:1;transform:translate(calc(var(--dx)*.25),calc(var(--dy)*.25)) rotate(calc(var(--r)*.5)) scale(1.2)}100%{transform:translate(var(--dx),calc(var(--dy) + 80px)) rotate(var(--r)) scale(.6);opacity:0}}
/* Touch-friendly buttons */
button{font-family:'DM Sans',sans-serif;-webkit-user-select:none;user-select:none;touch-action:manipulation;min-height:44px;transition:transform .1s,opacity .1s}
button:active:not(:disabled){transform:scale(.96)!important;opacity:.85}
input{font-family:'DM Sans',sans-serif;min-height:44px}
/* Scrollbar */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:rgba(0,0,0,.2)}::-webkit-scrollbar-thumb{background:#2e2b5e;border-radius:3px}
/* Responsive text */
.fs-xs{font-size:11px;line-height:1.5}
.fs-sm{font-size:13px;line-height:1.5}
.fs-md{font-size:15px;line-height:1.6}
.fs-lg{font-size:18px;line-height:1.4}
.fs-xl{font-size:22px;line-height:1.3}
.fs-2xl{font-size:28px;line-height:1.2}
.fs-pixel-sm{font-family:'Press Start 2P',monospace;font-size:10px;line-height:1.6}
.fs-pixel-md{font-family:'Press Start 2P',monospace;font-size:13px;line-height:1.5}
.fs-pixel-lg{font-family:'Press Start 2P',monospace;font-size:16px;line-height:1.4}

    intro:`I manage our entire supply chain from Wolf's factory. The ordering experience is painful. We order by email, zero visibility on your stock, and then half is backordered. My team of four spends 2 hours daily calling "where is my order?" Three stock-outs this quarter on critical SKUs. Workshops are losing patience — it reflects badly on us, not Wolf.`,

      {t:`Should we just escalate backorders faster through your Wolf account manager?`,buff:'boostEnemy',correct:false,fb:`Tomasz: "Escalation is firefighting. I need systems, not more phone calls." — You offered a band-aid before understanding the root cause.`},

// Helper: lighten a #rrggbb hex by mixing toward white by `amt` (0..1)
function lighten(hex,amt){
 const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
 const nr=Math.round(r+(255-r)*amt),ng=Math.round(g+(255-g)*amt),nb=Math.round(b+(255-b)*amt);
 return '#'+[nr,ng,nb].map(v=>v.toString(16).padStart(2,'0')).join('');
}
// Helper: draw a stone pedestal / monument plinth at the bottom of the canvas.
// Each landmark now rises from a proper pixel-art platform instead of a warehouse.
// Signature kept compatible with the old warehouse helper — the second and
// third colors are interpreted as the shadow tone (roof → dark seam) and the
// decorative trim accent (door → emblem fill), and a lighter tone is derived
// from `stoneC` at runtime for highlights.
function drawWarehouseBase(x,w,h,stoneC,darkC,accentC){
 const light=lighten(stoneC,.35);
 // Soft ground shadow
 x.fillStyle='rgba(0,0,0,.42)';x.beginPath();x.ellipse(w/2,h-2,w/2-2,4,0,0,Math.PI*2);x.fill();
 const by=h-20;
 // Three-step tapered plinth (wider at bottom, narrower at top)
 const steps=[[4,by+14,w-8,6],[6,by+8,w-12,6],[9,by+2,w-18,6]];
 steps.forEach(([sx,sy,sw,sh])=>{
  x.fillStyle=stoneC;x.fillRect(sx,sy,sw,sh);
  // Light top edge
  x.fillStyle=light;x.fillRect(sx,sy,sw,1);x.fillRect(sx,sy+1,1,sh-2);
  // Dark bottom / right edge
  x.fillStyle=darkC;x.fillRect(sx,sy+sh-1,sw,1);x.fillRect(sx+sw-1,sy+1,1,sh-1);
  // Vertical stone seams every 8 px
  for(let i=sx+6;i<sx+sw-2;i+=8){x.fillStyle=darkC;x.fillRect(i,sy+1,1,sh-2)}
 });
 // Engraved plaque across the middle step
 const pw=Math.min(28,w-30),px=Math.round(w/2-pw/2);
 x.fillStyle=darkC;x.fillRect(px,by+10,pw,3);
 x.fillStyle=accentC;x.fillRect(px+2,by+11,pw-4,1);
 // Two small lanterns flanking the top step
 x.fillStyle=darkC;x.fillRect(10,by-1,2,3);x.fillRect(w-12,by-1,2,3);
 x.fillStyle='#ffd27a';x.fillRect(10,by-2,2,1);x.fillRect(w-12,by-2,2,1);
}

// ── BRUSSELS: Atomium (connected silver spheres) ──
function drawBrussels(x,w,h){
 drawWarehouseBase(x,w,h,'#d0d0d0','#2a4a8a','#2a2a4a');
 const cx=w/2,baseY=h-22;
 // Spheres: center + 4 at corners of a diamond
 function sphere(cxx,cyy,r){
  x.fillStyle='#808088';x.beginPath();x.arc(cxx,cyy,r+1,0,Math.PI*2);x.fill();
  x.fillStyle='#c8c8d0';x.beginPath();x.arc(cxx,cyy,r,0,Math.PI*2);x.fill();
  x.fillStyle='#e8e8f0';x.beginPath();x.arc(cxx-r*0.4,cyy-r*0.4,r*0.35,0,Math.PI*2);x.fill();
  x.fillStyle='#fff';x.beginPath();x.arc(cxx-r*0.5,cyy-r*0.55,r*0.15,0,Math.PI*2);x.fill();
 }
 // Connecting rods
 x.strokeStyle='#606068';x.lineWidth=3;
 const mid={x:cx,y:baseY-26};
 const top={x:cx,y:baseY-52};
 const left={x:cx-18,y:baseY-22};
 const right={x:cx+18,y:baseY-22};
 const below={x:cx,y:baseY-10};
 [top,left,right,below].forEach(p=>{x.beginPath();x.moveTo(mid.x,mid.y);x.lineTo(p.x,p.y);x.stroke()});
 // Side-to-side rods for triangular structure
 x.beginPath();x.moveTo(left.x,left.y);x.lineTo(top.x,top.y);x.stroke();
 x.beginPath();x.moveTo(right.x,right.y);x.lineTo(top.x,top.y);x.stroke();
 x.beginPath();x.moveTo(left.x,left.y);x.lineTo(below.x,below.y);x.stroke();
 x.beginPath();x.moveTo(right.x,right.y);x.lineTo(below.x,below.y);x.stroke();
 // Spheres drawn on top of rods
 sphere(top.x,top.y,7);
 sphere(left.x,left.y,7);
 sphere(right.x,right.y,7);
 sphere(mid.x,mid.y,8);
 sphere(below.x,below.y,6);
}

function genBldTex(scene){

function genCarTex(scene){

  x.fillStyle='#0a1a6a';x.fillRect(ox+3,3,10,17);

  // Roof (dark)
  x.fillStyle='#0a1a6a';x.fillRect(ox+5,9,6,4);
  // White racing stripe down the middle
  x.fillStyle='#ffffff';x.fillRect(ox+7,9,2,4);
  // Rear window
  x.fillStyle='#b8d8f8';x.fillRect(ox+4,13,8,2);
  // Rear body
  x.fillStyle='#1a3ab8';x.fillRect(ox+4,15,8,4);
  // Racing number circle
  x.fillStyle='#ffffff';x.fillRect(ox+6,16,4,3);
  x.fillStyle='#1a3ab8';x.fillRect(ox+7,17,2,1);
  // Wolf-Oil side logo: gold racing stripe
  x.fillStyle='#FFD700';x.fillRect(ox+4,17,8,1);
  // Front bumper
  x.fillStyle='#5a7ac8';x.fillRect(ox+3,3,10,1);

  x.fillStyle='#ffdd00';x.fillRect(ox+4,3,2,1);x.fillRect(ox+10,3,2,1);
  // Tail lights (red at back)
  x.fillStyle='#ff0000';x.fillRect(ox+4,19,2,1);x.fillRect(ox+10,19,2,1);

 // Constrain the physics world + camera bounds to the currently-active region's
 // bounding box so the player only sees one continent at a time.
 applyRegionBounds(){
  const r=REGIONS[this.currentRegion||'EU'];if(!r)return;
  // Add generous padding (5 tiles = 80px) around the region box so buildings
  // and airports at the edges aren't clipped by the camera.
  const pad=TS*8;
  const x0=Math.max(0,p2x(r.x[0])-pad),y0=Math.max(0,p2y(r.y[0])-pad);
  const x1=Math.min(MPX,p2x(r.x[1])+pad),y1=Math.min(MPY,p2y(r.y[1])+pad);
  const bw=x1-x0,bh=y1-y0;
  if(this.physics&&this.physics.world)this.physics.world.setBounds(x0,y0,bw,bh);
  if(this.cameras&&this.cameras.main)this.cameras.main.setBounds(x0,y0,bw,bh);
 }
 syncVisibility(){
  const curR=this.currentRegion||'EU';
  ENC.forEach(enc=>{
   const npc=this.npcSprites[enc.id],bld=this.bldSprites[enc.id],lbl=this.labels[enc.id];
   if(!npc||!bld)return;
   const inRegion=enc.region===curR;
   const locked=(enc.seg==='B'&&this.playerLv<3)||(enc.seg==='A'&&this.playerLv<6);
   const defeated=this.doneIds.includes(enc.id);
   npc.setVisible(inRegion&&!locked&&!defeated);
   if(npc.body)npc.body.enable=inRegion&&!locked&&!defeated;
   bld.setVisible(inRegion);
   bld.setAlpha(locked?.4:1);
   if(defeated)bld.setTint(0xffd788);else bld.clearTint();
   if(lbl){lbl.setVisible(inRegion);lbl.setText((locked?'🔒 ':defeated?'✓ ':'')+enc.loc);lbl.setColor(defeated?'#FFD700':locked?'#EF4444':'#ffffff')}
  });
  const bn=this.npcSprites[99],bb=this.bldSprites[99],bl=this.labels[99];
  const bossIn=BOSS.region===curR;
  if(bn){bn.setVisible(bossIn&&this.bossReady&&!this.doneIds.includes(99));if(bn.body)bn.body.enable=bn.visible}
  if(bb){bb.setVisible(bossIn);bb.setAlpha(this.bossReady?1:.4);if(this.doneIds.includes(99))bb.setTint(0xffd788)}
  if(bl){bl.setVisible(bossIn);bl.setText((this.bossReady?(this.doneIds.includes(99)?'👑 CHAMPION':'👑 AUTOMECHANIKA'):'🔒 Clear all '+ENC.length));bl.setColor(this.doneIds.includes(99)?'#FFD700':this.bossReady?'#EF4444':'#8ca0d0')}
  // Hide non-current-region vans and airports so only the active continent is visible
  if(this.vans){const encRegion={};ENC.forEach(e=>{encRegion[e.id]=e.region});encRegion[99]=BOSS.region;
   for(const van of this.vans)van.setVisible(encRegion[van.encId]===curR)}
  if(this.airportSprites){Object.keys(this.airportSprites).forEach(k=>{
   const ap=this.airportSprites[k],inR=k===curR;
   if(ap)ap.setVisible(inR);
  })}
  if(this.airportBodies){this.airportBodies.getChildren().forEach(body=>{
   const inR=body.getData('regionKey')===curR;body.setVisible(inR);if(body.body)body.body.enable=inR;
  })}

  // Hide rocks/flowers/trees outside region

 onNpcCollide(npc){

 update(time,delta){

  }

    const py=this.hero.y+Math.sin(ang)*10+(Math.random()-0.5)*4;
    const dust=this.add.circle(px,py,3,0xd4c08c,0.8);

   }
  }else{
   // Walking mode: existing hero anims
   if(vx<0){this.hero.anims.play('hero-walk-left',true);this.lastDir='left'}
   else if(vx>0){this.hero.anims.play('hero-walk-right',true);this.lastDir='right'}
   else if(vy<0){this.hero.anims.play('hero-walk-up',true);this.lastDir='up'}

   const bob=1+Math.sin((time+enc.id*473)*0.004)*0.05;
   npc.setScale(1,bob);
   if(st.t>=st.iv){st.t=0;st.ang=Math.random()*Math.PI*2;st.iv=1800+Math.random()*2000}
   const nspd=enc.isBoss?4:6;
   let nvx=Math.cos(st.ang)*nspd,nvy=Math.sin(st.ang)*nspd;
   const dh=Phaser.Math.Distance.Between(npc.x,npc.y,st.hx,st.hy);
   const md=enc.isBoss?32:48;
   if(dh>md){
    const ha=Phaser.Math.Angle.Between(npc.x,npc.y,st.hx,st.hy);
    st.ang=ha;nvx=Math.cos(ha)*nspd;nvy=Math.sin(ha)*nspd;
   }
   if(npc.body){npc.body.setVelocity(nvx,nvy)}
   if(enc.id===99){npc.anims.play('boss-walk',true)}
   else{
    const adir=Math.abs(nvx)>Math.abs(nvy)?(nvx<0?'left':'right'):(nvy<0?'up':'down');
    const k='npc'+enc.v+'-walk-'+adir;
    if(this.anims.exists(k))npc.anims.play(k,true);
   }
  }
  // Delivery vans orbit their building on an ellipse; rotate to face direction of travel
  if(this.vans){
   for(const van of this.vans){
    van.phase+=van.spd*delta;
    const a=van.phase;
    const nx=van.bx+Math.cos(a)*van.rx;
    const ny=van.by+Math.sin(a)*van.ry;
    van.setPosition(nx,ny);
    // Facing: tangent to the ellipse
    const tx=-Math.sin(a)*van.rx;
    const ty=Math.cos(a)*van.ry;
    van.setRotation(Math.atan2(ty,tx)+Math.PI/2);
   }
  }
  // Planes circle their airport on a wider ellipse, always facing motion direction
  if(this.planes){
   for(const pl of this.planes){
    pl.phase+=pl.spd*delta;
    const a=pl.phase;
    pl.setPosition(pl.bx+Math.cos(a)*pl.rx,pl.by+Math.sin(a)*pl.ry);
    const tx=-Math.sin(a)*pl.rx,ty=Math.cos(a)*pl.ry;
    pl.setRotation(Math.atan2(ty,tx)+Math.PI/2);
    // Subtle altitude bob
    pl.setScale(1+Math.sin(a*2)*0.04);
   }
  }
  // Depth sort (y-sort for hero + NPCs; buildings sort by their top-of-base edge)
  this.hero.setDepth(this.hero.y);
  // Shadow follows hero
  if(this.heroShadow){this.heroShadow.setPosition(this.hero.x,this.hero.y+20);this.heroShadow.setDepth(this.hero.y-1)}
  // NPC shadows
  for(const enc of ALL){
   const npc=this.npcSprites[enc.id],sh=this.npcShadows[enc.id];
   if(npc&&sh){sh.setPosition(npc.x,npc.y+18);sh.setDepth(npc.y-1);sh.setVisible(npc.visible)}
  }
  // Cloud shadows drift
  if(this.cloudShadows){
   const cam=this.cameras.main;
   for(const cs of this.cloudShadows){
    cs.x+=cs.vx*delta/1000;cs.y+=cs.vy*delta/1000;
    // Wrap around camera view area
    if(cs.x>cam.scrollX+cam.width/cam.zoom+200)cs.x=cam.scrollX-200;
    if(cs.y>cam.scrollY+cam.height/cam.zoom+150)cs.y=cam.scrollY-150;
   }
  }
  for(const enc of ALL){
   const npc=this.npcSprites[enc.id];
   if(npc&&npc.visible)npc.setDepth(npc.y);
   const bld=this.bldSprites[enc.id];
   if(bld)bld.setDepth(bld.y+bld.height*0.2);
  }
  // Random event spawner
  this.evTimer+=delta;
  if(this.evTimer>=this.evNextSpawn&&this.evGroup.getChildren().length<3){
   this.evTimer=0;this.evNextSpawn=8000+Math.random()*7000;
   const types=['coffee','treasure','colleague','competitor','briefing'];
   const t=types[Math.floor(Math.random()*types.length)];
   // Pick a tile away from buildings, hero, and water (max 20 attempts)
   for(let tries=0;tries<20;tries++){
    const ex=80+Math.random()*(MPX-160),ey=80+Math.random()*(MPY-160);
    if(MAP_DATA){const ti=Math.floor(ey/TS),tj=Math.floor(ex/TS);if(MAP_DATA[ti]&&MAP_DATA[ti][tj]===4)continue}
    const dHero=Phaser.Math.Distance.Between(ex,ey,this.hero.x,this.hero.y);
    if(dHero<60)continue;
    let tooNear=false;
    for(const enc of ALL){const dB=Phaser.Math.Distance.Between(ex,ey,p2x(enc.mx),p2y(enc.my));if(dB<48){tooNear=true;break}}
    if(tooNear)continue;
    const ev=this.physics.add.sprite(ex,ey,'ev_'+t);
    ev.setData('type',t);
    ev.setDepth(ey-2);
    this.tweens.add({targets:ev,y:ey-3,duration:600,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.tweens.add({targets:ev,scaleX:1.1,scaleY:1.1,duration:800,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    this.evGroup.add(ev);
    break;
   }
  }
  // "!" indicator over nearest valid NPC
  let showed=false;
  for(const enc of ALL){
   const npc=this.npcSprites[enc.id];
   if(!npc||!npc.visible)continue;
   if(this.doneIds.includes(enc.id))continue;
   if(enc.id===99&&!this.bossReady)continue;
   if((enc.seg==='B'&&this.playerLv<3)||(enc.seg==='A'&&this.playerLv<6))continue;
   const d=Phaser.Math.Distance.Between(this.hero.x,this.hero.y,npc.x,npc.y);
   if(d<70){
    this.exclSprite.setPosition(npc.x,npc.y-24);
    this.exclSprite.setVisible(true);
    this.exclSprite.setAlpha(0.55+0.45*Math.sin(time/180));
    showed=true;break;
   }
  }
  if(!showed)this.exclSprite.setVisible(false);
 }
}

// ── OVERWORLD: trees, buildings, world map ──
// Decorative sprite coordinates — generated per region from a deterministic
// pseudo-random sequence so each continent gets its own trees/rocks/flowers
// without having to maintain handcrafted arrays. Each entry is [px,py,region].
const _rng=(s=>()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff})(42);
const TREES=[],ROCKS=[],FLWRS=[];
Object.keys(REGIONS).forEach(k=>{
 const r=REGIONS[k];
 // Expand the interior slightly so decorations don't crowd the airport/distributors
 const x0=r.x[0]+2,x1=r.x[1]-2,y0=r.y[0]+3,y1=r.y[1]-3;
 const rand=(lo,hi)=>lo+_rng()*(hi-lo);
 const count={EU:14,AM:10,MEA:7,CIS:11,AP:14}[k]||10;
 // Trees: sprinkled across the region, avoiding the airport inner ring
 for(let i=0;i<count;i++){
  const px=rand(x0,x1),py=rand(y0,y1);
  const dAp=Math.hypot(px-r.ax,py-r.ay);
  if(dAp<6)continue;
  TREES.push([px,py,k]);
 }
 // Rocks (fewer)
 for(let i=0;i<Math.max(3,Math.floor(count/3));i++){
  const px=rand(x0,x1),py=rand(y0,y1);
  ROCKS.push([px,py,k]);
 }
 // Flowers (even fewer, but visible pops of color)
 for(let i=0;i<Math.max(3,Math.floor(count/4));i++){
  const px=rand(x0,x1),py=rand(y0,y1);
  FLWRS.push([px,py,k]);
 }
});

    // Clear stale Bridge listeners so they don't accumulate

   };
   const onMap=ph==='map'&&tab==='map';

   Bridge.emit('game-state-sync',{done,lv,bossReady:done.length>=ENC.length,vehicle,currentRegion});

   if(s.vehicle)setVehicle(s.vehicle);
   if(typeof s.perfectDia==='number')setPerfectDia(s.perfectDia);
   if(typeof s.noHits==='number')setNoHits(s.noHits);
   if(typeof s.maxCombo==='number')setMaxCombo(s.maxCombo);
   if(Array.isArray(s.achs))setAchs(s.achs);
   if(typeof s.t0==='number')setT0(s.t0);
   if(typeof s.currentRegion==='string'&&REGIONS[s.currentRegion])setCurrentRegion(s.currentRegion);
   setLoaded(true);
  },[]);
  useEffect(()=>{
   // Only persist once we've passed the title screen (i.e., user has pressed START/CONTINUE)
   if(!loaded||ph==='title')return;
   writeSave({nm,gold,xp,lv,done,inv,items,hairIdx,skinIdx,tunicIdx,genderIdx,mentorIdx,hasCar,hasBike,vehicle,perfectDia,noHits,maxCombo,achs,t0,currentRegion});
  },[loaded,ph,nm,gold,xp,lv,done,inv,items,hairIdx,skinIdx,tunicIdx,genderIdx,mentorIdx,hasCar,hasBike,vehicle,perfectDia,noHits,maxCombo,achs,t0,currentRegion]);
  const hasSave=loaded&&!!loadSave();

              ...ENC.filter(e=>e.region===currentRegion&&inR(e)).map(e=>{const d=done.includes(e.id);const lk=(e.seg==='B'&&lv<3)||(e.seg==='A'&&lv<6);return h('g',{key:'mb'+e.id},
                h('circle',{cx:e.mx,cy:e.my,r:mk,fill:d?'#FFD700':lk?'#555':'#EF4444',stroke:'#fff',strokeWidth:mk*0.15}),
                h('text',{x:e.mx,y:e.my+mk*0.45,fontSize:mk*1.2,fill:'#fff',textAnchor:'middle',fontFamily:'sans-serif',fontWeight:'bold',stroke:'#000',strokeWidth:mk*0.08,paintOrder:'stroke'},e.loc[0]))}),
              // Boss marker (larger, purple glow)
              BOSS.region===currentRegion&&h('g',{key:'bs'},
                h('circle',{cx:BOSS.mx,cy:BOSS.my,r:mk*1.4,fill:done.includes(99)?'#FFD700':done.length>=ENC.length?'#ff00ff':'#555',stroke:'#fff',strokeWidth:mk*0.2}),
                h('text',{x:BOSS.mx,y:BOSS.my+mk*0.5,fontSize:mk*1.4,fill:'#fff',textAnchor:'middle',fontFamily:'sans-serif',fontWeight:'bold',stroke:'#000',strokeWidth:mk*0.1,paintOrder:'stroke'},'★')),
              // Airport — distinct RUNWAY shape (rectangle + stripes) so it reads differently from circles
              h('g',{key:'ap'},
                h('rect',{x:r.ax-mk*3,y:r.ay-mk*0.8,width:mk*6,height:mk*1.6,rx:mk*0.3,fill:'#3a3a42',stroke:'#FFD700',strokeWidth:mk*0.15}),
                // Centre dashes
                h('line',{x1:r.ax-mk*2.5,y1:r.ay,x2:r.ax+mk*2.5,y2:r.ay,stroke:'#e8e020',strokeWidth:mk*0.2,strokeDasharray:mk*0.6+' '+mk*0.3}),
                h('text',{x:r.ax,y:r.ay-mk*1.2,fontSize:mk*1.6,fill:'#FFD700',textAnchor:'middle',style:{fontFamily:'sans-serif'}},'✈')),
              // Player marker (cyan pulsing dot)
              h('circle',{cx:heroMapPos.x,cy:heroMapPos.y,r:mk*0.8,fill:'#00ffff',stroke:'#fff',strokeWidth:mk*0.12}),
              h('circle',{cx:heroMapPos.x,cy:heroMapPos.y,r:mk*1.2,fill:'none',stroke:'#00ffff',strokeWidth:mk*0.15,opacity:.5})))
        })(),
        // D-pad (React overlay → Bridge)
        (()=>{const btn={width:44,height:44,display:'flex',alignItems:'center',justifyContent:'center',background:'rgba(12,24,96,.78)',border:'1px solid #7a96ff',borderRadius:8,color:'#e8f0ff',fontSize:20,cursor:'pointer',touchAction:'none',userSelect:'none'};const press=v=>e=>{e.preventDefault();Bridge.emit('dpad',v)};const rel=e=>{e.preventDefault();Bridge.emit('dpad',{x:0,y:0})};return h('div',{style:{position:'absolute',right:12,bottom:12,display:'grid',gridTemplateColumns:'44px 44px 44px',gridTemplateRows:'44px 44px 44px',gap:3,zIndex:20}},
          h('div'),h('button',{style:btn,onPointerDown:press({x:0,y:-1}),onPointerUp:rel,onPointerLeave:rel,onPointerCancel:rel},'▲'),h('div'),
          h('button',{style:btn,onPointerDown:press({x:-1,y:0}),onPointerUp:rel,onPointerLeave:rel,onPointerCancel:rel},'◀'),h('div'),h('button',{style:btn,onPointerDown:press({x:1,y:0}),onPointerUp:rel,onPointerLeave:rel,onPointerCancel:rel},'▶'),
          h('div'),h('button',{style:btn,onPointerDown:press({x:0,y:1}),onPointerUp:rel,onPointerLeave:rel,onPointerCancel:rel},'▼'),h('div'))})()),
      // Stats
      (()=>{const regEnc=ENC.filter(e=>e.region===currentRegion);const regDone=regEnc.filter(e=>done.includes(e.id)).length;
       return h('div',{className:'ff7 fs-xs',style:{display:'flex',justifyContent:'space-between',marginTop:10,padding:'10px 14px',color:C.mu}},
        h('span',null,'🌍 '+regDone+'/'+regEnc.length+' '+((REGIONS[currentRegion]?.nm||'').split(' ')[0])),
        h('span',null,'🎒 '+inv.length+'/33'),
        h('span',null,'🛒 '+items.length+' items'))})()));
}

ReactDOM.createRoot(document.getElementById('R')).render(h(App));
</script>
