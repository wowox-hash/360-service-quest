  {id:1,loc:'Brussels',co:'Belgium',npc:'Marc Peeters',rl:'Purchasing Manager',company:'AutoParts Benelux',v:0,ch:'220 garages + 15 fast-fit centres',seg:'C',mx:22,my:42,bld:'GARAGE',
    intro:`Thank you for coming. We have a serious problem with product recommendations. Our 15 counter staff use printed guides last updated six months ago. Hybrids, Euro 7, Chinese imports — our team is guessing. Garages are sending products back. We're losing €8,000/month in reverse logistics. Three garages told us last month they're considering switching. I need a solution that works at the counter, every day.`,
    dia:{q:`Marc is losing €8,000/month to returns. You have one discovery question before the pitch — make it count.`,opts:[
      {t:`When your counter staff get a vehicle they're not sure about, walk me through exactly what happens today.`,buff:'reduceHp',correct:true,fb:`Marc: "They check the printed guide. If it's not listed, they call the hotline or just pick the closest match." — That's the gap. The outdated guide is shipping wrong products.`},
      {t:`Would upselling every garage to a premium synthetic that covers most applications solve it?`,buff:'boostEnemy',correct:false,fb:`Marc: "That might protect quality, but it doesn't solve the identification problem." — You pitched product before discovery. He's now defensive.`},
      {t:`Do your staff just ask the garage what they used last time?`,buff:null,correct:false,fb:`Marc: "Sometimes — but that just perpetuates old errors." — A shallow probe. You learned something, but not the root cause.`},
    ]},
    objs:[
      {t:`"My counter staff don't have time for another tool. They handle 200+ calls daily."`,hp:30,w:['reco_tool'],r:['oil_analysis','trade_fairs'],p:'CONNECT'},
      {t:`"We already have TecDoc through our parts platform. How is yours different?"`,hp:34,w:['tecdoc'],r:['marketing_portal','promo_calendar'],p:'CONNECT'},
      {t:`"How do I know this actually reduces returns? I need proof, not promises."`,hp:26,w:['tecdoc','reco_tool'],r:['co_visits','design_studio'],p:'CONNECT'},
    ],rw:{xp:120,gold:50}},
  {id:2,loc:'Stockholm',co:'Sweden',npc:'Erik Lindqvist',rl:'Commercial Director',company:'Nordic Oil Distribution',v:1,ch:'80 fleet operators + 45 HD workshops',seg:'B',mx:50,my:14,bld:'HALL',
    intro:`I manage 12 sales reps. Commercially excellent — great relationships, strong negotiators. But we're losing fleet tenders. When a fleet manager asks about drain intervals or TCO for 200 trucks, my reps go quiet. Last quarter, a competitor brought a lubricant engineer to the pitch and walked away with €400K in contracts. My reps had nothing to counter. I can't hire 12 engineers. I need my team to hold their ground.`,
    dia:{q:`Erik just lost €400K to a competitor who brought a lubricant engineer to the pitch. Ask the question that uncovers his real problem.`,opts:[
      {t:`When your reps face a deep technical question in a fleet meeting, what actually happens in the room?`,buff:'reduceHp',correct:true,fb:`Erik: "They say 'I'll get back to you' — but by then the competitor has already answered live." — That confidence gap in the moment IS the problem. Now you can position co-visits.`},
      {t:`Could your reps win more tenders if you sharpened their pricing and negotiation?`,buff:'boostEnemy',correct:false,fb:`Erik: "Pricing? My reps are great negotiators. That's not the gap." — You framed his problem as commercial weakness. He's insulted.`},
      {t:`Have you considered giving your reps more product brochures and TDS documents?`,buff:null,correct:false,fb:`Erik: "We have plenty of docs. They don't replace live technical credibility." — A surface-level probe. Missed the real issue.`},
    ]},
    objs:[
      {t:`"Training takes my people off the road. We did a day last year — nothing changed."`,hp:36,w:['physical_training','academy'],r:['promo_templates','edi'],p:'ENABLE'},
      {t:`"We've been burned before. Two days in a classroom, forgotten in a month."`,hp:40,w:['co_visits'],r:['marketing_portal','custom_label'],p:'ENABLE'},
      {t:`"Fleet managers want lab data — not a sales rep reading from a product sheet."`,hp:36,w:['oil_analysis','co_visits'],r:['promo_calendar','retail_kits'],p:'ENABLE'},
    ],rw:{xp:180,gold:75}},
  {id:3,loc:'Madrid',co:'Spain',npc:'Alejandra Ruiz',rl:'General Manager',company:'Distribución Ibérica',v:2,ch:'300 garages + 40 tyre shops',seg:'C',mx:22,my:68,bld:'SHOP',
    intro:`We're growing 12% yearly, but garages see us as interchangeable. "You all deliver the same thing — whoever's cheapest this month wins." Zero marketing, no POS, no campaigns. I don't have a designer or budget for agencies. But I watch competitors show up with professional displays and we look amateur.`,
    dia:{q:`Alejandra says garages see every supplier as interchangeable. She has no designer, no marketing budget, and zero campaigns. What do you probe?`,opts:[
      {t:`Have you ever tried running your own promotion to stand out — and what happened?`,buff:'reduceHp',correct:true,fb:`Alejandra: "I made a flyer in PowerPoint once. It looked terrible. Zero response." — Her instinct is right; the tools are missing. That's your opening.`},
      {t:`Could you win on payment terms instead of marketing spend?`,buff:'boostEnemy',correct:false,fb:`Alejandra: "Payment terms are a race to the bottom. That's not a brand." — You pushed her toward commoditization, exactly what she's trying to escape.`},
      {t:`Don't your products just speak for themselves?`,buff:null,correct:false,fb:`Alejandra: "Garages see every supplier as identical — product alone doesn't win." — A passive probe. You missed the emotional pain.`},
    ]},
    objs:[
      {t:`"I don't have a single person who can create marketing materials."`,hp:30,w:['marketing_portal','content_kits'],r:['edi','palletization'],p:'GROW'},
      {t:`"Zero budget. Every euro goes to inventory and logistics."`,hp:30,w:['promo_templates','content_kits'],r:['oil_analysis','connectivity'],p:'GROW'},
    ],rw:{xp:100,gold:45}},
  {id:4,loc:'Warsaw',co:'Poland',npc:'Tomasz Kowalski',rl:'Supply Chain Mgr',company:'Trans-Cargo Logistics',v:3,ch:'3 warehouses → 350 workshops',seg:'B',mx:78,my:22,bld:'DEPOT',
    intro:`I manage our entire supply chain from Wolf's factory. The ordering experience is painful. We order by email, zero visibility on your stock, and then half is backordered. My team of four spends 2 hours daily calling "where is my order?" Three stock-outs this quarter on critical SKUs. Workshops are losing patience — it reflects badly on us, not Wolf.`,
    dia:{q:`Tomasz's team spends 2 hours/day calling about orders. Three stock-outs last quarter. What do you want to uncover first?`,opts:[
      {t:`When a product turns out to be backordered, what's the downstream impact on your workshops?`,buff:'reduceHp',correct:true,fb:`Tomasz: "We can't fulfil our own customers. Workshops order from competitors as backup." — Wolf's opacity is cascading into HIS customer promises. That's the real cost.`},
      {t:`Should we just escalate backorders faster through your Wolf account manager?`,buff:'boostEnemy',correct:false,fb:`Tomasz: "Escalation is firefighting. I need systems, not more phone calls." — You offered a band-aid before understanding the root cause.`},
      {t:`Have you considered holding extra safety stock to absorb backorders?`,buff:null,correct:false,fb:`Tomasz: "That's expensive — and I'd still be blind to incoming shipments." — A workaround discussion, not a real discovery.`},
    ]},
    objs:[
      {t:`"I just need orders to arrive when you say they will."`,hp:35,w:['lead_time'],r:['content_kits','academy'],p:'DELIVER'},
      {t:`"How can I plan if I can't see Wolf stock before ordering?"`,hp:35,w:['stock_visibility','e_ordering'],r:['promo_templates','co_visits'],p:'DELIVER'},
      {t:`"My workshops want to know exactly when. So do I."`,hp:32,w:['order_tracker','lead_time'],r:['design_studio','oil_monitoring'],p:'DELIVER'},
    ],rw:{xp:180,gold:75}},
  {id:5,loc:'Dubai',co:'UAE',npc:'Ahmed Al-Rashidi',rl:'Operations Director',company:'Gulf Auto Supplies',v:4,ch:'80 garages + 30 fleet workshops',seg:'B',mx:78,my:58,bld:'SHOP',
    intro:`Top 30 workshops consume 2,000+ litres monthly. Delivered in 200L drums. Oil storage areas are a mess — drums stacked, spills everywhere. And my real problem: nothing stops a competitor walking in tomorrow with a lower price. Zero switching barriers. The relationship is purely transactional.`,
    dia:{q:`Ahmed admits his relationships are purely transactional — zero switching barriers. What question exposes the stakes?`,opts:[
      {t:`If a competitor walked in tomorrow with a lower price, what would keep your top garages with you?`,buff:'reduceHp',correct:true,fb:`Ahmed: "Honestly — nothing. We'd have to match or lose the account." — He just told you he has no structural defense. Now you can sell him the barriers.`},
      {t:`Isn't your product quality enough to differentiate at this volume?`,buff:'boostEnemy',correct:false,fb:`Ahmed: "Quality differences are invisible to garages at my scale." — You pitched a feature when he needed a structural moat.`},
      {t:`What about the long personal relationships you've built with these garages?`,buff:null,correct:false,fb:`Ahmed: "Relationships are nice — but they don't scale and they don't lock anyone in." — A soft probe without real leverage.`},
    ]},
    objs:[
      {t:`"Garages say they don't want to invest. Just deliver drums."`,hp:40,w:['lubricant_mgmt'],r:['promo_templates','edi'],p:'GROW'},
      {t:`"Even with equipment — what stops them filling it with competitor oil?"`,hp:36,w:['oil_monitoring'],r:['academy','regulatory_label'],p:'GROW'},
      {t:`"Big investment. Show me the ROI numbers."`,hp:32,w:['lubricant_mgmt','oil_monitoring'],r:['push_a_button','goods_loading'],p:'GROW'},
    ],rw:{xp:200,gold:90}},
  {id:6,loc:'Paris',co:'France',npc:'Philippe Moreau',rl:'Purchasing Director',company:'AutoDistri France',v:5,ch:'3 branches → 180 garages',seg:'C',mx:40,my:42,bld:'OFFICE',
    intro:`Every Wolf order: receive branch requests by email, consolidate in spreadsheet, type into email to your support, wait for confirmation, manually enter into our ERP. My team of four spends 60% of time on this. Error rate: 8%. One in twelve orders wrong. Each triggers a credit note and an angry branch manager.`,
    dia:{q:`Philippe's four-person team burns 60% of their time on orders, with an 8% error rate. Where do you dig?`,opts:[
      {t:`Walk me through exactly where in the process those 8% errors originate.`,buff:'reduceHp',correct:true,fb:`Philippe: "Manual re-keying between email and ERP — keystroke errors on references." — Now you've got the ROI hook: eliminate the manual chain entirely.`},
      {t:`Is Wolf shipping the wrong products to your branches?`,buff:'boostEnemy',correct:false,fb:`Philippe: "No — the errors are in MY process, not yours." — You accused the supplier before listening. He's now defending his own ops.`},
      {t:`Are your branches sending unclear requests that confuse your team?`,buff:null,correct:false,fb:`Philippe: "Branches are fine. Errors happen during consolidation and re-entry." — Partial signal. You missed the bottleneck.`},
    ]},
    objs:[
      {t:`"We've ordered by email for 15 years. Why change what works?"`,hp:30,w:['edi'],r:['content_kits','oil_analysis'],p:'CONNECT'},
      {t:`"No IT department. We're a distribution company, not a tech company."`,hp:30,w:['e_ordering'],r:['co_visits','trade_fairs'],p:'DELIVER'},
    ],rw:{xp:100,gold:45}},
  {id:7,loc:'London',co:'United Kingdom',npc:'James Hartley',rl:'Key Account Mgr, Fleet',company:'FleetServ UK',v:6,ch:'40+ fleet accounts across the Midlands',seg:'B',mx:22,my:22,bld:'HALL',
    intro:`Three competitors now offer oil condition monitoring. They send sample kits, run lab analysis, present reports with wear metals and drain intervals. One convinced my biggest account — 200 trucks — that their oil was performing better. I lost that account. Now fleet managers ask "what data can you show me?" and all I have is verbal assurances.`,
    dia:{q:`James lost a 200-truck account because competitors brought oil analysis data and he had nothing. What question cracks this open?`,opts:[
      {t:`What specifically made your competitors' oil analysis data compelling to that fleet manager?`,buff:'reduceHp',correct:true,fb:`James: "Lab reports with real wear trends and drain recommendations tailored to that fleet." — That's your capability gap in exact detail. Now you can propose it.`},
      {t:`Could we offer oil analysis free as a short-term promo to win it back?`,buff:'boostEnemy',correct:false,fb:`James: "I don't need a discount — I need the capability." — You pitched price instead of discovering the real need. He sees you as tactical, not strategic.`},
      {t:`Is it the brand name of the lab doing the analysis that fleet managers trust?`,buff:null,correct:false,fb:`James: "No — the data persuades, not the brand." — A weak probe. You learned what doesn't matter, not what does.`},
    ]},
    objs:[
      {t:`"Oil testing sounds complex. My team are salespeople, not lab technicians."`,hp:36,w:['oil_analysis'],r:['promo_templates','custom_label'],p:'ENABLE'},
      {t:`"Even with data, my reps can't present it to a fleet engineering manager."`,hp:36,w:['co_visits'],r:['marketing_portal','palletization'],p:'ENABLE'},
      {t:`"We're 12 months behind competitors. How do we catch up?"`,hp:32,w:['oil_analysis','co_visits'],r:['promo_calendar','goods_loading'],p:'ENABLE'},
    ],rw:{xp:200,gold:90}},
  {id:8,loc:'Frankfurt',co:'Germany',npc:'Klaus Weber',rl:'CEO',company:'Petrol-Parts GmbH',v:7,ch:'€5M+ annual. 400 garages, 60 fleets.',seg:'A',mx:60,my:42,bld:'SHOP',
    intro:`Petrol-Parts is the regional market leader. Mature sales force, professional logistics, strong marketing. I'm not looking for basic services. I want a strategic brand partnership. Joint visibility at Automechanika. Exclusive WRC hospitality for my top 50 customers. Co-branded campaigns. Shell offered something similar — the execution was poor. Generic materials with their logo next to ours. If Wolf can deliver a true partnership, I'll commit significant volume.`,
    dia:{q:`Klaus rejected Shell's partnership and won't settle for basic services. He's testing whether you're a strategic peer. What do you ask?`,opts:[
      {t:`When Shell's execution fell short, what specifically disappointed you about the way they showed up?`,buff:'reduceHp',correct:true,fb:`Klaus: "Generic materials with a logo swap. It felt like a template, not a partnership." — He just told you exactly what bespoke looks like. Now you can position Partnership Activation.`},
      {t:`Was Shell's pricing the real issue — would better terms have saved the deal?`,buff:'boostEnemy',correct:false,fb:`Klaus: "Price? I'm offering significant volume. I care about execution." — You flagged yourself as a transactional vendor. He's disengaging.`},
      {t:`Was it Shell's product quality that didn't match their premium positioning?`,buff:null,correct:false,fb:`Klaus: "Quality wasn't the problem — the partnership execution was." — You missed the real signal and burned a turn.`},
    ]},
    objs:[
      {t:`"Show me what's exclusive to a Wolf strategic partner. Not basic stuff."`,hp:45,w:['partnership_activation'],r:['tecdoc','e_ordering'],p:'GROW'},
      {t:`"Shell promised co-branded events and sent generic banners. Can you actually deliver?"`,hp:42,w:['partnership_activation','trade_fairs'],r:['push_a_button','palletization'],p:'GROW'},
      {t:`"My top customers are CEOs. They expect motorsport hospitality, not a conference room."`,hp:38,w:['partnership_activation','trade_fairs'],r:['stock_visibility','academy'],p:'GROW'},
    ],rw:{xp:300,gold:150}},

const BOSS={id:99,loc:'Frankfurt',co:'AUTOMECHANIKA',npc:'THE BOARD',rl:'Global Buying Alliance',company:'Automechanika 2026',v:11,ch:'Pan-European, 3,000+ garages',seg:'S',mx:50,my:84,bld:'CONV',isBoss:true,
  intro:`We represent 12 European countries, 3,000 garages, 200 fleet operators. Shell, Castrol, Fuchs, and Motul already presented this week. Each promised to be a "growth partner." Five challenges. Address them with capabilities, or this meeting ends in 10 minutes.`,

    {t:`What would a true 360° partnership need to do DIFFERENTLY from your current suppliers to be worth switching volume?`,buff:'reduceHp',correct:true,fb:`Board: "Wrap data, knowledge, and operational tools around OUR business — not bolt your logo on top of ours." — You led with THEIR business. They're leaning in. This is your opening.`},
    {t:`Can I walk you through Wolf's R&D pipeline and product quality advantages?`,buff:'boostEnemy',correct:false,fb:`Board: "Every competitor makes quality claims. We've heard four this week." — You pitched product to a partnership audience. They've seen this movie.`},
    {t:`Would more competitive pricing and flexible payment terms win your business?`,buff:null,correct:false,fb:`Board: "Pricing doesn't differentiate at this level. We need strategic depth, not discounts." — You undersold yourselves before they even saw the capability.`},

    {t:`"Shell already partners with us across 6 countries. Why switch any volume to Wolf?"`,hp:55,w:['partnership_activation','trade_fairs','network_concept'],r:['push_a_button','custom_label','e_ordering'],p:'GROW'},

    {t:`"Your 10-day lead time vs competitor 48 hours. How do we stock Wolf?"`,hp:55,w:['lead_time','stock_visibility','product_reservation'],r:['content_kits','academy','promo_templates'],p:'DELIVER'},

function App(){
  const [ph,setPh]=useState('title');

  // ── WALK: keyboard input (only on overworld) ──
  useEffect(()=>{if(ph!=='map'||tab!=='map')return;const m={ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},a:{x:-1,y:0},A:{x:-1,y:0},d:{x:1,y:0},D:{x:1,y:0},w:{x:0,y:-1},W:{x:0,y:-1},s:{x:0,y:1},S:{x:0,y:1}};const kd=ev=>{const v=m[ev.key];if(v){ev.preventDefault();setDir(v)}};const ku=ev=>{if(m[ev.key])setDir({x:0,y:0})};window.addEventListener('keydown',kd);window.addEventListener('keyup',ku);return()=>{window.removeEventListener('keydown',kd);window.removeEventListener('keyup',ku);setDir({x:0,y:0})}},[ph,tab]);

  // ── WALK: collision with roaming NPCs ──

    if(id==='intel'){setShowW(true);setLog(p=>[...p,{y:'i',t:'🔍 Weaknesses revealed!'}])}else if(id==='coffee'){setPHp(p=>Math.min(MHP,p+30));setLog(p=>[...p,{y:'i',t:'☕ +30 HP!'}])}else if(id==='playbook'){setDmgB(true);setLog(p=>[...p,{y:'i',t:'📘 +25% damage!'}])}else if(id==='shield'){setShld(true);setLog(p=>[...p,{y:'i',t:'🛡️ Shield active!'}])}else if(id==='combo_charm'){setComboB(true);setLog(p=>[...p,{y:'i',t:'✨ Combo 2x!'}])}else if(id==='mega_heal'){setPHp(MHP);setLog(p=>[...p,{y:'i',t:'⚡ Full HP!'}])}};

    const isW=ob.w.includes(sel),isR=ob.r.includes(sel);
    let cm=1,nc=combo;if(sv.p===lastPil){nc=combo+1;cm=1+(nc*.15*(comboB?2:1))}else nc=0;setCombo(nc);setLastPil(sv.p);
    let d=sv.pw;

    else if(isR){d=Math.round(sv.pw*.2);snd('miss');setFl({y:'m',v:d})}
    else{d=Math.round(sv.pw*.7*cm*(dmgB?1.25:1));snd('atk');setSE(true);setFl({y:'n',v:d})}
    setLog(p=>[...p,{y:'p',t:`${isW?'⚔️ SUPER EFFECTIVE! ':''}${sv.n}: ${d} dmg${nc>0?' ('+nc+'x combo)':''}`}]);
    const nH=Math.max(0,oHp-d);setOHp(nH);
    setTimeout(()=>{setSE(false);setFl(null);
      if(nH<=0){setXp(prev=>({...prev,[ob.p]:prev[ob.p]+40}));setLog(p=>[...p,{y:'s',t:'✨ Objection defeated! +40 '+ob.p+' XP'}]);snd('sel');
        setTimeout(()=>{if(oi+1>=enc.objs.length){setGold(g=>g+enc.rw.gold);const sp=Math.floor(enc.rw.xp/4);setXp(p=>{const n={...p};['CONNECT','ENABLE','GROW','DELIVER'].forEach(k=>n[k]+=sp);return n});setDone(p=>[...p,enc.id]);setLog(p=>[...p,{y:'v',t:'🏆 VICTORY! +'+enc.rw.gold+'g +'+enc.rw.xp+'XP'}]);snd('win');setPh('victory');
            if(enc.isBoss){const ft=Math.round((Date.now()-t0)/1000);sbPost({player_name:nm,level:cLv,gold:gold+enc.rw.gold,encounters_cleared:done.length+1,is_champion:true,total_time_seconds:ft,xp_connect:xp.CONNECT,xp_enable:xp.ENABLE,xp_grow:xp.GROW,xp_deliver:xp.DELIVER});sbLoad().then(d=>{if(d)setLb(d)})}
          }else{const nx=enc.objs[oi+1];setOi(oi+1);setOHp(Math.round(nx.hp*(diaBuff==='boostEnemy'?1.25:diaBuff==='reduceHp'?.85:1)));setLog(p=>[...p,{y:'s',t:'New objection incoming...'}]);snd('blip');setSelP(null);setSel(null)}setAn(false)},800)}

        setTimeout(()=>{setSH(false);setAn(false)},300)},400)}
    },600);setSel(null);setSelP(null)
  },[sel,an,enc,oi,oHp,combo,lastPil,comboB,dmgB,shld,diaBuff,sndOn,xp]);

  // ═══ TITLE ═══

      h('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:16,marginTop:20}},

        h('div',{className:'pf',style:{color:'#FFD700',fontSize:36,animation:'titleGlow 2.5s ease-in-out infinite',letterSpacing:2}},'360°'),

          h('span',{className:'fs-xs',style:{color:C.mu}},'LV'+e.level+' · '+e.encounters_cleared+'⚔️'+(e.is_champion?' 👑':''))))),

    h(LvlUp,{lvUp,lv}),
    enc.isBoss&&h('div',{className:'pf fs-pixel-sm',style:{color:C.no,textAlign:'center',marginTop:12,animation:'blink 1s ease infinite'}},'⚠️ FINAL BOSS ⚠️'),
    h('div',{style:{textAlign:'center',marginTop:16}},
      h('div',{style:{width:56,height:84,margin:'0 auto'},dangerouslySetInnerHTML:{__html:enc.isBoss?SP.mon('GROW',true):SP.npc(enc.v)}}),
      h('div',{className:'fs-lg',style:{fontWeight:700,color:enc.isBoss?C.no:C.gold,marginTop:8}},enc.npc),
      h('div',{className:'fs-sm',style:{color:C.mu}},enc.rl+' — '+enc.company),
      h('div',{className:'fs-xs',style:{color:C.mu,marginTop:2}},'📍 '+enc.loc+', '+enc.co+' · '+enc.ch)),
    // NPC speech
    h('div',{className:'ff7',style:{padding:16,marginTop:16,animation:'fadeIn .5s ease'}},
